<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictia AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 16px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
    }
    .header-text h1 { font-size: 15px; font-weight: 800; }
    .header-text p { font-size: 11px; opacity: 0.8; }
    .content { padding: 16px; }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-connected { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .status-disconnected { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .note-preview {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      margin-bottom: 12px;
    }
    .no-note {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary { background: #4f46e5; color: white; margin-bottom: 8px; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }
    .note-label {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">D</div>
    <div class="header-text">
      <h1>Dictia AI</h1>
      <p>Asistente de notas médicas</p>
    </div>
  </div>

  <div class="content">
    <div id="status-container"></div>
    <div id="note-container"></div>
    <div id="actions-container"></div>
    <div class="info-row">
      <span>Haz clic en el campo de texto y luego en "Insertar"</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
